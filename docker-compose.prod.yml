# =============================================================================
# WellKorea ERP - Production Docker Compose
# =============================================================================
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# With monitoring stack:
#   docker compose -f docker-compose.prod.yml --profile monitoring up -d
#
# Prerequisites:
#   1. Copy .env.prod.example to .env and configure all required values
#   2. Configure host Nginx for SSL termination (see docs/deployment.md)
#   3. Ensure Harbor registry access (docker login harbor.mipllab.com)
#
# Architecture:
#   - All services bind to 127.0.0.1 (localhost only)
#   - Host Nginx handles SSL termination and proxies to these ports
#   - Images pulled from Harbor registry (built by GitLab CI)
#
# Subdomains:
#   - https://wellkorea.mipllab.com -> proxy to 127.0.0.1:3000 (frontend)
#   - https://api.wellkorea.mipllab.com -> proxy to 127.0.0.1:8080 (backend)
#   - https://storage.wellkorea.mipllab.com -> proxy to 127.0.0.1:9000 (minio)
#
# Monitoring (opt-in via --profile monitoring):
#   - Grafana: 127.0.0.1:3001 (behind host Nginx)
#   - Prometheus / Loki: internal only (not port-exposed)
# =============================================================================

services:
  # PostgreSQL Database (internal only)
  postgres:
    image: postgres:16-alpine
    container_name: wellkorea-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No port exposed - only accessible within Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wellkorea-internal

  # Backend Application
  backend:
    image: ${BACKEND_IMAGE:-harbor.mipllab.com/wellkorea/erp-backend:latest}
    container_name: wellkorea-erp-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod

      # Database Configuration
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate

      # MinIO Configuration (external URL for presigned URLs)
      MINIO_URL: ${MINIO_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME}

      # JWT Configuration (REQUIRED - must be strong secret)
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      # Email Configuration
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Security Configuration
      SECURITY_CORS_ALLOWED_ORIGINS: ${SECURITY_CORS_ALLOWED_ORIGINS}
      SECURITY_SWAGGER_ENABLED: "false"
    ports:
      # Bind to localhost only - Nginx proxies external traffic
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - wellkorea-internal

  # MinIO S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: wellkorea-erp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      # Bind to localhost only - Nginx proxies external traffic
      # Only API port exposed (9000), console (9001) is internal
      - "127.0.0.1:9000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - wellkorea-internal

  # Frontend Application
  frontend:
    image: ${FRONTEND_IMAGE:-harbor.mipllab.com/wellkorea/erp-frontend:latest}
    container_name: wellkorea-erp-frontend
    restart: unless-stopped
    ports:
      # Bind to localhost only - Nginx proxies external traffic
      - "127.0.0.1:3000:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-internal

  # ===========================================================================
  # Monitoring Stack (opt-in: --profile monitoring)
  # ===========================================================================

  # Prometheus — Metrics collection (internal only, no port exposed)
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: wellkorea-erp-prometheus
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - wellkorea-internal

  # Loki — Log aggregation (internal only, no port exposed)
  loki:
    image: grafana/loki:3.4.2
    container_name: wellkorea-erp-loki
    restart: unless-stopped
    profiles: [monitoring]
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - wellkorea-internal

  # Promtail — Ships container logs to Loki
  promtail:
    image: grafana/promtail:3.4.2
    container_name: wellkorea-erp-promtail
    restart: unless-stopped
    profiles: [monitoring]
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - wellkorea-internal

  # Grafana — Dashboards (localhost-bound, behind host Nginx)
  grafana:
    image: grafana/grafana:11.5.2
    container_name: wellkorea-erp-grafana
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - wellkorea-internal

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local

networks:
  wellkorea-internal:
    driver: bridge
