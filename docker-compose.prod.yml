# =============================================================================
# WellKorea ERP - Production Docker Compose
# =============================================================================
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# With monitoring stack:
#   docker compose -f docker-compose.prod.yml --profile monitoring up -d
#
# Prerequisites:
#   1. Copy .env.prod.example to .env and configure all required values
#   2. Configure host Nginx for SSL termination (see docs/deployment.md)
#   3. Ensure Harbor registry access (docker login harbor.mipllab.com)
#
# Architecture:
#   - Services bind to 192.168.0.16 (server IP) for gateway access
#   - Gateway Nginx (separate server) handles SSL termination and proxies to these ports
#   - Images pulled from Harbor registry (built by GitLab CI)
#
# Subdomains:
#   - https://wellkorea.mipllab.com -> proxy to 192.168.0.16:20030 (frontend)
#   - https://api.wellkorea.mipllab.com -> proxy to 192.168.0.16:20080 (backend)
#   - https://storage.wellkorea.mipllab.com -> proxy to 192.168.0.16:20090 (minio)
#
# Monitoring (opt-in via --profile monitoring):
#   - Grafana: 192.168.0.16:20040 (behind gateway Nginx)
#   - n8n: 192.168.0.16:20050 (workflow automation for alerts)
#   - Prometheus / Loki: internal only (not port-exposed)
# =============================================================================

services:
  # PostgreSQL Database (internal only)
  postgres:
    image: postgres:16-alpine
    container_name: wellkorea-erp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No port exposed - only accessible within Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wellkorea-internal

  # Backend Application
  backend:
    image: ${BACKEND_IMAGE:-harbor.mipllab.com/wellkorea/erp-backend:latest}
    container_name: wellkorea-erp-backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Only variables that need TRANSFORMATION go here (env_file loads the rest)
      SPRING_PROFILES_ACTIVE: prod

      # Database Configuration (transforms POSTGRES_* to Spring format)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate

      # MinIO Configuration (maps env names to Spring property names)
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}

      # Security (disable swagger in prod)
      SECURITY_SWAGGER_ENABLED: "false"
    ports:
      # Bind to server IP for gateway access - Gateway Nginx proxies external traffic
      - "192.168.0.16:20080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - wellkorea-internal

  # MinIO S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: wellkorea-erp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      # Bind to server IP for gateway access - Gateway Nginx proxies external traffic
      # Only API port exposed (9000), console (9001) is internal
      - "192.168.0.16:20090:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - wellkorea-internal

  # Frontend Application
  frontend:
    image: ${FRONTEND_IMAGE:-harbor.mipllab.com/wellkorea/erp-frontend:latest}
    container_name: wellkorea-erp-frontend
    restart: unless-stopped
    environment:
      API_BACKEND_URL: http://backend:8080/api/
    ports:
      # Bind to server IP for gateway access - Gateway Nginx proxies external traffic
      - "192.168.0.16:20030:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-internal

  # ===========================================================================
  # Monitoring Stack (opt-in: --profile monitoring)
  # ===========================================================================

  # Prometheus — Metrics collection (internal only, no port exposed)
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: wellkorea-erp-prometheus
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-internal

  # Loki — Log aggregation (internal only, no port exposed)
  loki:
    image: grafana/loki:3.4.2
    container_name: wellkorea-erp-loki
    restart: unless-stopped
    profiles: [monitoring]
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-internal

  # Promtail — Ships container logs to Loki
  promtail:
    image: grafana/promtail:3.4.2
    container_name: wellkorea-erp-promtail
    restart: unless-stopped
    profiles: [monitoring]
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /ready HTTP/1.0\\r\\n\\r\\n\" > /dev/tcp/localhost/9080'"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-internal

  # Grafana — Dashboards (localhost-bound, behind host Nginx)
  grafana:
    image: grafana/grafana:11.5.2
    container_name: wellkorea-erp-grafana
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # Alerting webhook URL (used in contact point provisioning)
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/grafana-alerts}
    ports:
      # Bind to server IP for gateway access - Gateway Nginx proxies external traffic
      - "192.168.0.16:20040:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-internal

  # n8n — Workflow automation for alerting (creates GitHub issues from alerts)
  n8n:
    image: n8nio/n8n:latest
    container_name: wellkorea-erp-n8n
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${N8N_WEBHOOK_BASE_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: Asia/Seoul
      # Loki URL for fetching correlated logs
      LOKI_URL: http://loki:3100
      # GitHub integration (used in workflow)
      GITHUB_PAT: ${GITHUB_PAT}
      GITHUB_OWNER: ${GITHUB_OWNER:-donghwunline}
      GITHUB_REPO: ${GITHUB_REPO:-wellkorea-erp}
    ports:
      # Bind to server IP for gateway access - Gateway Nginx proxies external traffic
      - "192.168.0.16:20050:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-internal

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  n8n_data:
    driver: local

networks:
  wellkorea-internal:
    driver: bridge
