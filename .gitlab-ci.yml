# =============================================================================
# WellKorea ERP - GitLab CI Pipeline
# =============================================================================
# This pipeline runs on GitLab CI with Harbor registry integration.
#
# Stages:
#   1. security - Trivy, Gitleaks, Semgrep scans
#   2. test     - Backend (JUnit/JaCoCo) and Frontend (ESLint/Vitest) tests
#   3. docker   - Build and push images to Harbor (main branch only)
#
# Required CI/CD Variables (Settings > CI/CD > Variables):
#   - HARBOR_REGISTRY: harbor.mipllab.com
#   - HARBOR_USERNAME: robot$wellkorea-ci
#   - HARBOR_PASSWORD: (robot token, masked)
# =============================================================================

stages:
  - security
  - test
  - docker

variables:
  HARBOR_REGISTRY: harbor.mipllab.com
  HARBOR_PROJECT: wellkorea
  BACKEND_IMAGE: ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/erp-backend
  FRONTEND_IMAGE: ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/erp-frontend

default:
  tags:
    - docker
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - backend/.gradle/
      - frontend/node_modules/

# ==================== SECURITY STAGE ====================
# Runs on all branches and merge requests

trivy-scan:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --severity CRITICAL,HIGH --exit-code 1 .
  allow_failure: false

gitleaks:
  stage: security
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --no-git --verbose
  allow_failure: true  # Warning only - scans current files, not git history

semgrep:
  stage: security
  image: returntocorp/semgrep:latest
  script:
    - semgrep --config auto --error .
  allow_failure: true  # Warning only, does not block pipeline

# ==================== TEST STAGE ====================
# Runs on all branches and merge requests

backend-test:
  stage: test
  image: gradle:8.11-jdk21
  script:
    - cd backend
    - ./gradlew clean build jacocoTestReport jacocoTestCoverageVerification --no-daemon
  artifacts:
    when: always
    reports:
      junit: backend/build/test-results/test/*.xml
    paths:
      - backend/build/reports/
    expire_in: 30 days
  # JaCoCo coverage parsing (matches "Total: XX%" format from console)
  coverage: '/Total[^%]*\s+(\d+(?:\.\d+)?)\s*%/'

frontend-test:
  stage: test
  image: node:22-alpine
  script:
    - cd frontend
    - npm ci
    - npm run lint
    - npm run test:coverage
    - npm run build
  artifacts:
    when: always
    paths:
      - frontend/dist/
      - frontend/coverage/
    expire_in: 7 days
  # Vitest coverage parsing (matches "All files | XX.XX |" format)
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'

# ==================== DOCKER STAGE ====================
# Build AND push in same job (Docker images don't persist between jobs)
# Only runs on main branch after tests pass

docker-backend:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script:
    - echo "${HARBOR_PASSWORD}" | docker login ${HARBOR_REGISTRY} -u ${HARBOR_USERNAME} --password-stdin
  script:
    # Build image
    - docker build -t ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} ./backend
    # Tag with branch name and latest
    - docker tag ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} ${BACKEND_IMAGE}:${CI_COMMIT_REF_SLUG}
    - docker tag ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA} ${BACKEND_IMAGE}:latest
    # Push all tags
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${BACKEND_IMAGE}:${CI_COMMIT_REF_SLUG}
    - docker push ${BACKEND_IMAGE}:latest
    - echo "✅ Backend image pushed to ${BACKEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - backend-test

docker-frontend:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  before_script:
    - echo "${HARBOR_PASSWORD}" | docker login ${HARBOR_REGISTRY} -u ${HARBOR_USERNAME} --password-stdin
  script:
    # Build image
    - docker build -t ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} ./frontend
    # Tag with branch name and latest
    - docker tag ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} ${FRONTEND_IMAGE}:${CI_COMMIT_REF_SLUG}
    - docker tag ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA} ${FRONTEND_IMAGE}:latest
    # Push all tags
    - docker push ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${FRONTEND_IMAGE}:${CI_COMMIT_REF_SLUG}
    - docker push ${FRONTEND_IMAGE}:latest
    - echo "✅ Frontend image pushed to ${FRONTEND_IMAGE}:${CI_COMMIT_SHORT_SHA}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  needs:
    - frontend-test

# ==================== DEPLOYMENT (DEFERRED) ====================
# TODO: Add deployment stages later
# - deploy-dev (auto)
# - deploy-staging (manual approval)
# - deploy-prod (manual approval with protected environment)
