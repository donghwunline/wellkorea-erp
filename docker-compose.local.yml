# =============================================================================
# WellKorea ERP - Local Development Docker Compose
# =============================================================================
# Usage: docker compose -f docker-compose.local.yml up -d
#
# With monitoring stack:
#   docker compose -f docker-compose.local.yml --profile monitoring up -d
#
# Prerequisites:
#   1. Copy .env.local.example to .env
#   2. Add "127.0.0.1 minio.local" to /etc/hosts (for presigned URLs)
#
# Services:
#   - PostgreSQL: localhost:5432
#   - Backend API: localhost:8080
#   - MinIO API: localhost:9000 (also minio.local:9000)
#   - MinIO Console: localhost:9001
#   - Frontend: localhost:80
#
# Monitoring (opt-in via --profile monitoring):
#   - Prometheus: localhost:9090
#   - Grafana: localhost:3000 (admin/admin)
#   - Loki: localhost:3100
#   - n8n: localhost:5678 (workflow automation for alerts)
# =============================================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: wellkorea-erp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wellkorea_erp}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wellkorea-network

  # Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wellkorea-erp-backend
    env_file: .env
    environment:
      # Only variables that need TRANSFORMATION go here (env_file loads the rest)

      # Database Configuration (transforms POSTGRES_* to Spring format)
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-wellkorea_erp}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-validate}

      # MinIO Configuration (maps MINIO_ROOT_* to MINIO_ACCESS_*/SECRET_*)
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wellkorea-network

  # MinIO S3-compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: wellkorea-erp-minio
    hostname: minio.local
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      wellkorea-network:
        aliases:
          - minio.local

  # Frontend Application (Nginx serving built assets)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wellkorea-erp-frontend
    environment:
      API_BACKEND_URL: http://backend:8080/api/
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - wellkorea-network

  # ===========================================================================
  # Monitoring Stack (opt-in: --profile monitoring)
  # ===========================================================================

  # Prometheus — Metrics collection
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: wellkorea-erp-prometheus
    profiles: [monitoring]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-network

  # Loki — Log aggregation
  loki:
    image: grafana/loki:3.4.2
    container_name: wellkorea-erp-loki
    profiles: [monitoring]
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-network

  # Promtail — Ships container logs to Loki
  promtail:
    image: grafana/promtail:3.4.2
    container_name: wellkorea-erp-promtail
    profiles: [monitoring]
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo -e \"GET /ready HTTP/1.0\\r\\n\\r\\n\" > /dev/tcp/localhost/9080'"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-network

  # Grafana — Dashboards for metrics and logs
  grafana:
    image: grafana/grafana:11.5.2
    container_name: wellkorea-erp-grafana
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # Alerting webhook URL (used in contact point provisioning)
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/grafana-alerts}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-network

  # n8n — Workflow automation for alerting (creates GitHub issues from alerts)
  n8n:
    image: n8nio/n8n:latest
    container_name: wellkorea-erp-n8n
    profiles: [monitoring]
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_BASE_URL:-http://localhost:5678}
      GENERIC_TIMEZONE: Asia/Seoul
      # Loki URL for fetching correlated logs
      LOKI_URL: http://loki:3100
      # GitHub integration (used in workflow)
      GITHUB_PAT: ${GITHUB_PAT:-}
      GITHUB_OWNER: ${GITHUB_OWNER:-donghwunline}
      GITHUB_REPO: ${GITHUB_REPO:-wellkorea-erp}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - loki
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - wellkorea-network

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local
  grafana_data:
    driver: local
  n8n_data:
    driver: local

networks:
  wellkorea-network:
    driver: bridge
