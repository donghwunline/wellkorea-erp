# Prometheus Configuration for WellKorea ERP
# Scrapes Spring Boot Actuator metrics from the backend service.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "wellkorea-erp-backend"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["backend:8080"]
        labels:
          application: "wellkorea-erp-backend"
