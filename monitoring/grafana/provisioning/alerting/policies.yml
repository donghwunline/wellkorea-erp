# =============================================================================
# Grafana Notification Policies for WellKorea ERP
# =============================================================================
# Routes alerts to n8n webhook for automated GitHub issue creation.
#
# Timing Configuration:
#   - group_wait: 30s - Wait before sending first notification for a new group
#   - group_interval: 5m - Wait before sending notifications for new alerts in existing group
#   - repeat_interval: 4h - Wait before resending notification for same alert
# =============================================================================

apiVersion: 1

policies:
  - orgId: 1
    receiver: n8n-webhook
    group_by:
      - alertname
      - service
      - severity
    routes: []
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
