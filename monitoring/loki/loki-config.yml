# Loki Configuration for WellKorea ERP
# Filesystem-based storage with 7-day retention.

auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true # Enable structured metadata for correlationId visibility
  retention_period: 168h          # 7 days — required for compactor retention
  ingestion_rate_mb: 3            # 3 MB/s per tenant — increase if logs are being dropped
  ingestion_burst_size_mb: 6
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 7 days

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem

analytics:
  reporting_enabled: false
